  button { background: #5b50f0; color: #fff; border: none; padding: 14px 28px; border-radius: 10px; font-size: 15px; cursor: pointer; margin-top: 16px; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .done { color: #16b864; font-weight: bold; }
  .err  { color: #e02040; font-weight: bold; }

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // 소속·직급·realName 데이터 (점수·코드·팀 제외)

    "user_014": { affiliation: "법인·매장영업팀",  position: "파트너" },
    "user_015": { affiliation: "광화문점",        position: "매니저" },

    "user_017": { affiliation: "제작본부",       position: "본부장" },
    "user_018": { affiliation: "경영기획팀",      position: "팀장" },

    "user_026": { affiliation: "오롬예공소",      position: "" },
    "user_027": { affiliation: "온라인마케팅팀",   position: "파트너" },
    "user_028": { affiliation: "오롬주식회사",    position: "PM" },

    "user_047": { affiliation: "디자인팀",        position: "파트너" }
  };

  const log = document.getElementById('log');
  function addLog(msg, cls='') {
    log.innerHTML += `<span class="${cls}">${msg}</span>\n`;
    log.scrollTop = log.scrollHeight;
  }

  window.startUpload = async function() {
    const btn = document.getElementById('startBtn');
    btn.disabled = true;
    log.innerHTML = '';
    addLog('업로드 시작...\n');
    let ok = 0, fail = 0;
    for (const [uid, data] of Object.entries(profiles)) {
      try {
        await update(ref(db, `participants/${uid}`), data);
        addLog(`✓ ${uid} (${data.affiliation} / ${data.position || '—'})`);
        ok++;
      } catch(e) {
        addLog(`✗ ${uid} 실패: ${e.message}`, 'err');
        fail++;
      }
    }
    addLog(`\n완료! 성공: ${ok}명 / 실패: ${fail}명`, 'done');
    btn.disabled = false;
    btn.textContent = '✅ 완료 (다시 실행)';
  };
</script>
</body>
</html>
