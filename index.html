<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>워크샵 스코어보드</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg:        #f4f6fb;
    --surface:   #ffffff;
    --surface2:  #f0f2f8;
    --border:    #e2e6f0;
    --accent:    #5b50f0;
    --accent2:   #f05070;
    --accent3:   #16b864;
    --text:      #1a1a2e;
    --text2:     #7a7a9a;
    --danger:    #e02040;
    --gold:      #e08b00;
    --team-a:    #5b50f0;
    --team-b:    #f05070;
    --team-c:    #16b864;
    --team-d:    #e08b00;
    --team-e:    #0099cc;
    --shadow:    0 2px 12px rgba(80,80,160,0.08);
    --shadow-lg: 0 4px 24px rgba(80,80,160,0.13);
    --nav-h:     64px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; overflow-x:hidden; }

  /* ── 로그인 ── */
  #loginScreen {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; padding:24px; gap:28px;
    background:linear-gradient(160deg,#eef1fb 0%,#fafaff 100%);
  }
  .login-logo { text-align:center; }
  .login-logo .logo-icon { font-size:56px; line-height:1; margin-bottom:12px; display:block; }
  .login-logo h1 {
    font-size:28px; font-weight:900; letter-spacing:-0.5px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .login-logo p { color:var(--text2); font-size:14px; margin-top:6px; }
  .login-card {
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    padding:28px 24px; width:100%; max-width:360px;
    display:flex; flex-direction:column; gap:14px; box-shadow:var(--shadow-lg);
  }
  .login-card label { display:block; font-size:12px; font-weight:700; color:var(--text2); margin-bottom:6px; letter-spacing:0.8px; text-transform:uppercase; }
  .login-card input {
    width:100%; background:var(--surface2); border:1.5px solid var(--border);
    border-radius:12px; padding:14px 16px; font-size:17px;
    font-family:'Noto Sans KR',sans-serif; color:var(--text); outline:none;
    transition:border-color 0.2s, box-shadow 0.2s;
  }
  .login-card input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(91,80,240,0.1); }
  .login-card input::placeholder { color:var(--text2); }
  .btn-login {
    width:100%; background:linear-gradient(135deg,var(--accent),#3d32cc);
    color:#fff; border:none; border-radius:14px; padding:16px;
    font-size:17px; font-weight:700; font-family:'Noto Sans KR',sans-serif;
    cursor:pointer; transition:opacity 0.15s; box-shadow:0 4px 16px rgba(91,80,240,0.3);
  }
  .btn-login:active { opacity:0.85; }
  #loginError {
    display:none; background:#fff0f3; border:1px solid #ffc0cc;
    border-radius:10px; padding:12px 14px; font-size:14px; color:#c0003c; text-align:center;
  }

  /* ── 앱 공통 ── */
  #appScreen { display:none; }
  .app-header {
    position:sticky; top:0; z-index:100;
    background:rgba(255,255,255,0.95); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border); padding:14px 18px 16px;
    box-shadow:0 2px 12px rgba(80,80,160,0.06);
  }
  .header-top { display:flex; align-items:center; justify-content:space-between; }
  .header-identity { font-size:20px; font-weight:900; letter-spacing:-0.3px; }
  .team-badge { display:inline-block; padding:3px 11px; border-radius:20px; font-size:13px; font-weight:700; margin-right:6px; vertical-align:middle; }
  .scores-row { display:flex; gap:8px; margin-top:12px; }
  .score-pill { flex:1; min-width:0; background:var(--surface2); border:1px solid var(--border); border-radius:14px; padding:10px 8px; text-align:center; }
  .score-pill .sp-label { font-size:10px; color:var(--text2); font-weight:700; text-transform:uppercase; letter-spacing:0.3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .score-pill .sp-value { font-size:22px; font-weight:900; font-family:'Space Mono',monospace; line-height:1.2; margin-top:2px; }
  .score-pill.team     .sp-value { color:var(--accent); }
  .score-pill.personal .sp-value { color:var(--accent3); }
  .score-pill.bbq      .sp-value { color:var(--gold); }
  .team-badge.bbq-badge { background:rgba(224,139,0,0.12); color:var(--gold); }

  /* ── 탭 콘텐츠 영역 ── */
  .tab-content {
    padding:16px; display:flex; flex-direction:column; gap:16px;
    padding-bottom:calc(var(--nav-h) + 20px);
  }
  .tab-panel { display:none; flex-direction:column; gap:16px; }
  .tab-panel.active { display:flex; }

  /* ── 하단 네비게이션 ── */
  .bottom-nav {
    position:fixed; bottom:0; left:0; right:0; z-index:200;
    height:var(--nav-h);
    background:rgba(255,255,255,0.97); backdrop-filter:blur(16px);
    border-top:1px solid var(--border);
    display:none;
    align-items:stretch;
    box-shadow:0 -2px 16px rgba(80,80,160,0.08);
  }
  .nav-btn {
    flex:1; background:none; border:none; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:4px; padding:8px 0 10px; font-family:'Noto Sans KR',sans-serif;
    color:var(--text2); transition:color 0.15s;
    position:relative;
  }
  .nav-btn .nav-icon { font-size:22px; line-height:1; }
  .nav-btn .nav-label { font-size:11px; font-weight:700; letter-spacing:0.3px; }
  .nav-btn.active { color:var(--accent); }
  .nav-btn.active::after {
    content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:32px; height:3px; background:var(--accent); border-radius:0 0 4px 4px;
  }
  .nav-btn.community-tab.active { color:var(--accent3); }
  .nav-btn.community-tab.active::after { background:var(--accent3); }

  /* ── 섹션 카드 ── */
  .section-card { background:var(--surface); border:1px solid var(--border); border-radius:18px; overflow:hidden; box-shadow:var(--shadow); }
  .section-header { display:flex; align-items:center; gap:8px; padding:14px 18px 12px; border-bottom:1px solid var(--border); }
  .section-header .sh-icon  { font-size:18px; }
  .section-header .sh-title { font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--text2); }
  .section-header .sh-badge { margin-left:auto; font-size:10px; font-weight:800; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; padding:3px 9px; border-radius:20px; }
  .section-header .sh-badge-gold { margin-left:auto; font-size:10px; font-weight:800; background:linear-gradient(135deg,var(--gold),#b86a00); color:#fff; padding:3px 9px; border-radius:20px; }

  /* ── 공지 ── */
  .notice-body  { padding:16px 18px; }
  .notice-empty { color:var(--text2); font-size:14px; text-align:center; padding:8px 0; }
  .notice-text  { font-size:16px; font-weight:600; line-height:1.65; }
  .notice-time  { font-size:12px; color:var(--text2); margin-top:8px; }
  .notice-new   { display:inline-block; width:8px; height:8px; background:var(--accent2); border-radius:50%; margin-right:6px; animation:pulse 1.5s infinite; vertical-align:middle; }

  /* ── 순위 ── */
  .ranking-list { padding:4px 0; }
  .rank-item { display:flex; align-items:center; padding:13px 18px; gap:14px; border-bottom:1px solid var(--border); }
  .rank-item:last-child { border-bottom:none; }
  .rank-item.me { background:#f5f3ff; }
  .rank-num { font-size:11px; font-weight:700; font-family:'Space Mono',monospace; color:var(--text2); width:28px; text-align:center; flex-shrink:0; }
  .rank-num.top1 { color:#c8900a; font-size:18px; }
  .rank-num.top2 { color:#7a8a9a; font-size:16px; }
  .rank-num.top3 { color:#a06030; font-size:16px; }
  .rank-info  { flex:1; min-width:0; }
  .rank-name  { font-size:16px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rank-team  { font-size:12px; color:var(--text2); margin-top:1px; }
  .rank-score { font-size:22px; font-weight:900; font-family:'Space Mono',monospace; color:var(--accent3); flex-shrink:0; }
  .rank-score span { font-size:12px; font-weight:400; color:var(--text2); font-family:'Noto Sans KR',sans-serif; }
  .me-tag { font-size:10px; font-weight:700; background:var(--accent); color:#fff; padding:2px 6px; border-radius:4px; margin-left:6px; vertical-align:middle; }
  .team-rank-list { padding:4px 0; }
  .team-rank-item { display:flex; align-items:center; padding:14px 18px; gap:14px; border-bottom:1px solid var(--border); }
  .team-rank-item:last-child { border-bottom:none; }
  .team-color-dot  { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
  .team-rank-name  { flex:1; font-size:17px; font-weight:700; }
  .team-rank-score { font-size:24px; font-weight:900; font-family:'Space Mono',monospace; }

  /* ── 로그아웃 ── */
  .logout-btn { background:none; border:1.5px solid var(--border); color:var(--text2); border-radius:10px; padding:10px 16px; font-size:14px; font-family:'Noto Sans KR',sans-serif; cursor:pointer; display:flex; align-items:center; gap:6px; margin:0 auto; }

  /* ── 공통 유틸 ── */
  .loading-dots { display:flex; gap:6px; justify-content:center; padding:20px; }
  .loading-dots span { width:8px; height:8px; background:var(--accent); border-radius:50%; animation:dot-bounce 1.2s infinite; }
  .loading-dots span:nth-child(2){animation-delay:0.2s;} .loading-dots span:nth-child(3){animation-delay:0.4s;}
  @keyframes dot-bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.3;} 40%{transform:scale(1);opacity:1;} }
  @keyframes pulse      { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  @keyframes scoreFlash { 0%{opacity:1;} 50%{opacity:0.2;} 100%{opacity:1;} }
  .score-flash { animation:scoreFlash 0.5s ease; }
  .tc-A{color:var(--team-a);background:rgba(91,80,240,0.1);}  .tc-B{color:var(--team-b);background:rgba(240,80,112,0.1);}
  .tc-C{color:var(--team-c);background:rgba(22,184,100,0.1);} .tc-D{color:var(--team-d);background:rgba(224,139,0,0.1);}
  .tc-E{color:var(--team-e);background:rgba(0,153,204,0.1);}  .tc-F{color:#9b59b6;background:rgba(155,89,182,0.1);}
  .dot-A{background:var(--team-a);} .dot-B{background:var(--team-b);}
  .dot-C{background:var(--team-c);} .dot-D{background:var(--team-d);} .dot-E{background:var(--team-e);} .dot-F{background:#9b59b6;}
  .score-A{color:var(--team-a);} .score-B{color:var(--team-b);}
  .score-C{color:var(--team-c);} .score-D{color:var(--team-d);} .score-E{color:var(--team-e);} .score-F{color:#9b59b6;}

  /* ── 별점 이벤트 ── */
  .review-body { padding:16px 18px 18px; display:flex; flex-direction:column; gap:14px; }
  .review-desc { font-size:14px; color:var(--text2); line-height:1.6; }
  .review-desc strong { color:var(--text); }
  .star-row { display:flex; justify-content:center; gap:6px; padding:4px 0; }
  .star-btn { background:none; border:none; font-size:38px; cursor:pointer; line-height:1; padding:4px; transition:transform 0.1s; filter:grayscale(1) opacity(0.35); }
  .star-btn.active { filter:none; }
  .star-btn:active { transform:scale(0.82); }
  .review-input { width:100%; background:var(--surface2); border:1.5px solid var(--border); border-radius:12px; padding:14px 16px; font-size:15px; font-family:'Noto Sans KR',sans-serif; color:var(--text); outline:none; transition:border-color 0.2s; resize:none; }
  .review-input:focus { border-color:var(--gold); }
  .review-input::placeholder { color:var(--text2); }
  .review-input:disabled { opacity:0.5; cursor:not-allowed; }
  .review-error { display:none; background:#fff0f3; border:1px solid #ffc0cc; border-radius:10px; padding:11px 14px; font-size:14px; color:#c0003c; text-align:center; }
  .btn-review-submit { width:100%; background:linear-gradient(135deg,var(--gold),#b86a00); color:#fff; border:none; border-radius:14px; padding:15px; font-size:16px; font-weight:700; font-family:'Noto Sans KR',sans-serif; cursor:pointer; transition:opacity 0.15s; box-shadow:0 4px 14px rgba(224,139,0,0.3); }
  .btn-review-submit:active { opacity:0.85; }
  .btn-review-submit:disabled { background:var(--surface2); color:var(--text2); box-shadow:none; cursor:not-allowed; }
  .review-complete-box { padding:24px 18px; text-align:center; }
  .review-complete-emoji { font-size:52px; display:block; margin-bottom:12px; animation:bounceIn 0.45s; }
  .review-complete-title { font-size:22px; font-weight:900; color:var(--accent3); margin-bottom:6px; }
  .review-complete-desc  { font-size:14px; color:var(--text2); line-height:1.6; }

  /* ── 뽑기 게임 ── */
  .game-body { padding:16px 18px 18px; display:flex; flex-direction:column; gap:14px; }
  .game-count-row { display:flex; align-items:center; gap:8px; }
  .game-count-dots { display:flex; gap:6px; }
  .game-count-dot { width:11px; height:11px; border-radius:50%; background:var(--border); transition:background 0.3s; }
  .game-count-dot.used { background:var(--accent); }
  .game-count-label { font-size:13px; color:var(--text2); font-weight:600; margin-left:4px; }
  .game-section-label { font-size:12px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px; }
  .bet-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .bet-btn { background:var(--surface2); border:1.5px solid var(--border); color:var(--text); border-radius:12px; padding:14px 0; font-size:16px; font-weight:700; font-family:'Space Mono',monospace; cursor:pointer; text-align:center; transition:all 0.15s; }
  .bet-btn.selected { background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 4px 12px rgba(91,80,240,0.3); }
  .bet-btn:disabled { opacity:0.3; cursor:not-allowed; }
  .bet-btn:not(:disabled):not(.selected):active { border-color:var(--accent); color:var(--accent); }
  .slip-hint { font-size:13px; color:var(--text2); text-align:center; padding:6px 0; }
  .slip-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
  .slip-btn { aspect-ratio:2/3; border:none; border-radius:12px; font-size:24px; cursor:pointer; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,var(--accent),#3d32cc); box-shadow:0 4px 12px rgba(91,80,240,0.25); transition:transform 0.12s, opacity 0.15s; }
  .slip-btn:active:not(:disabled) { transform:scale(0.88); }
  .slip-btn:disabled { opacity:0.3; cursor:not-allowed; box-shadow:none; background:var(--surface2); }
  .game-result-box { text-align:center; padding:8px 0 6px; }
  .game-result-emoji { font-size:54px; display:block; margin-bottom:10px; animation:bounceIn 0.45s; }
  .game-result-title { font-size:24px; font-weight:900; margin-bottom:5px; }
  .game-result-title.fail { color:var(--danger); }
  .game-result-title.keep { color:var(--text2); }
  .game-result-title.win  { color:var(--accent3); }
  .game-result-delta { font-size:17px; font-weight:700; font-family:'Space Mono',monospace; margin-bottom:20px; }
  .game-result-delta.minus { color:var(--danger); }
  .game-result-delta.plus  { color:var(--accent3); }
  .game-result-delta.zero  { color:var(--text2); }
  .btn-game-action { width:100%; border:none; border-radius:14px; padding:15px; font-size:16px; font-weight:700; font-family:'Noto Sans KR',sans-serif; cursor:pointer; transition:opacity 0.15s; }
  .btn-game-action.active { background:linear-gradient(135deg,var(--accent),#3d32cc); color:#fff; box-shadow:0 4px 14px rgba(91,80,240,0.3); }
  .btn-game-action.active:active { opacity:0.85; }
  .btn-game-action.done  { background:var(--surface2); color:var(--text2); cursor:default; }
  .game-done-msg { text-align:center; padding:24px 18px; color:var(--text2); font-size:15px; line-height:1.7; }

  @keyframes bounceIn { 0%{transform:scale(0.3);opacity:0;} 60%{transform:scale(1.18);} 100%{transform:scale(1);opacity:1;} }

  /* ── 동아리 탭 ── */
  .club-notice-card { background:linear-gradient(135deg,#fffbf0,#fff8e8); border:1.5px solid rgba(224,139,0,0.25); border-radius:18px; overflow:hidden; box-shadow:var(--shadow); }
  .club-notice-header { display:flex; align-items:center; gap:8px; padding:14px 18px 12px; border-bottom:1px solid rgba(224,139,0,0.2); }
  .club-notice-badge { font-size:10px; font-weight:800; background:linear-gradient(135deg,var(--gold),#b86a00); color:#fff; padding:3px 8px; border-radius:20px; margin-left:auto; }
  .club-notice-list { padding:4px 0; }
  .club-notice-item { padding:14px 18px; border-bottom:1px solid rgba(224,139,0,0.12); }
  .club-notice-item:last-child { border-bottom:none; }
  .club-notice-title { font-size:15px; font-weight:700; margin-bottom:4px; color:var(--text); }
  .club-notice-place { font-size:12px; color:var(--gold); font-weight:600; margin-bottom:4px; }
  .club-notice-desc  { font-size:13px; color:var(--text2); line-height:1.55; }

  .btn-club-create {
    width:100%; background:var(--surface); border:1.5px dashed var(--accent);
    color:var(--accent); border-radius:14px; padding:14px;
    font-size:15px; font-weight:700; font-family:'Noto Sans KR',sans-serif;
    cursor:pointer; transition:all 0.15s;
  }
  .btn-club-create:active { background:rgba(91,80,240,0.05); }

  .club-form-card { background:var(--surface); border:1.5px solid var(--accent); border-radius:18px; overflow:hidden; box-shadow:var(--shadow-lg); }
  .club-form-body { padding:16px 18px 18px; display:flex; flex-direction:column; gap:12px; }
  .club-form-label { font-size:12px; font-weight:700; color:var(--text2); letter-spacing:0.8px; text-transform:uppercase; margin-bottom:4px; display:block; }
  .club-form-input {
    width:100%; background:var(--surface2); border:1.5px solid var(--border);
    border-radius:12px; padding:12px 14px; font-size:15px;
    font-family:'Noto Sans KR',sans-serif; color:var(--text); outline:none;
    transition:border-color 0.2s;
  }
  .club-form-input:focus { border-color:var(--accent); }
  .club-form-input::placeholder { color:var(--text2); }
  .club-form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .btn-club-submit {
    width:100%; background:linear-gradient(135deg,var(--accent),#3d32cc);
    color:#fff; border:none; border-radius:12px; padding:14px;
    font-size:15px; font-weight:700; font-family:'Noto Sans KR',sans-serif;
    cursor:pointer; transition:opacity 0.15s; box-shadow:0 4px 14px rgba(91,80,240,0.25);
  }
  .btn-club-submit:active { opacity:0.85; }
  .btn-club-cancel { width:100%; background:none; border:1.5px solid var(--border); color:var(--text2); border-radius:12px; padding:12px; font-size:14px; font-family:'Noto Sans KR',sans-serif; cursor:pointer; }

  .club-list-empty { text-align:center; color:var(--text2); font-size:14px; padding:28px 18px; line-height:1.7; }
  .club-card { background:var(--surface); border:1px solid var(--border); border-radius:18px; overflow:hidden; box-shadow:var(--shadow); }
  .club-card-header { padding:14px 18px 10px; border-bottom:1px solid var(--border); }
  .club-card-title { font-size:16px; font-weight:700; margin-bottom:6px; }
  .club-card-meta { display:flex; flex-wrap:wrap; gap:8px; }
  .club-meta-chip { font-size:12px; color:var(--text2); display:flex; align-items:center; gap:3px; }
  .club-card-body { padding:12px 18px 14px; display:flex; flex-direction:column; gap:10px; }
  .club-card-desc { font-size:14px; color:var(--text2); line-height:1.55; }
  .club-members-row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .club-members-label { font-size:12px; color:var(--text2); font-weight:600; }
  .club-members-list { font-size:13px; color:var(--text); font-weight:600; flex:1; }
  .club-count-badge { font-size:12px; font-weight:700; padding:3px 9px; border-radius:20px; background:var(--surface2); color:var(--text2); white-space:nowrap; }
  .club-count-badge.full { background:rgba(224,32,64,0.08); color:var(--danger); }
  .btn-club-join {
    width:100%; background:linear-gradient(135deg,var(--accent3),#0e8a4a);
    color:#fff; border:none; border-radius:12px; padding:13px;
    font-size:15px; font-weight:700; font-family:'Noto Sans KR',sans-serif;
    cursor:pointer; transition:opacity 0.15s; box-shadow:0 4px 12px rgba(22,184,100,0.25);
  }
  .btn-club-join:active { opacity:0.85; }
  .btn-club-join:disabled { background:var(--surface2); color:var(--text2); box-shadow:none; cursor:default; }
  .btn-club-joined { width:100%; background:rgba(22,184,100,0.1); border:1.5px solid rgba(22,184,100,0.3); color:var(--accent3); border-radius:12px; padding:13px; font-size:15px; font-weight:700; font-family:'Noto Sans KR',sans-serif; cursor:default; }
</style>
</head>
<body>

<!-- ───────────── 로그인 화면 ───────────── -->
<div id="loginScreen">
  <div class="login-logo">
    <span class="logo-icon">🏆</span>
    <h1>워크샵 스코어</h1>
    <p>실시간 점수 현황판</p>
  </div>
  <div class="login-card">
    <div>
      <label>이름</label>
      <input type="text" id="inputName" placeholder="홍길동" autocomplete="off" inputmode="text">
    </div>
    <div>
      <label>전화번호 뒤 4자리</label>
      <input type="tel" id="inputCode" placeholder="1234" maxlength="4" inputmode="numeric">
    </div>
    <div id="loginError">이름 또는 번호가 일치하지 않습니다.</div>
    <button class="btn-login" onclick="doLogin()">입장하기</button>
  </div>
</div>

<!-- ───────────── 앱 화면 ───────────── -->
<div id="appScreen">

  <!-- 상단 헤더 (항상 표시) -->
  <div class="app-header">
    <div class="header-top">
      <div class="header-identity">
        <span id="headerTeamBadge" class="team-badge">팀</span>
        <span id="headerBbqBadge" class="team-badge bbq-badge" style="display:none">BBQ</span>
        <span id="headerName">이름</span>
      </div>
    </div>
    <div class="scores-row">
      <div class="score-pill personal">
        <div class="sp-label">개인 점수</div>
        <div class="sp-value" id="personalScoreDisplay">0</div>
      </div>
      <div class="score-pill team">
        <div class="sp-label">피지컬47</div>
        <div class="sp-value" id="teamScoreDisplay">0</div>
      </div>
      <div class="score-pill bbq">
        <div class="sp-label">바베큐</div>
        <div class="sp-value" id="bbqScoreDisplay">0</div>
      </div>
    </div>
  </div>

  <!-- 탭 콘텐츠 -->
  <div class="tab-content">

    <!-- ── 홈 탭 ── -->
    <div class="tab-panel active" id="tab-home">

      <!-- 공지사항 -->
      <div class="section-card">
        <div class="section-header">
          <span class="sh-icon">📢</span><span class="sh-title">공지사항</span>
          <span class="sh-badge">LIVE</span>
        </div>
        <div class="notice-body" id="noticeBody">
          <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
      </div>

      <!-- 피지컬47 팀 순위 -->
      <div class="section-card">
        <div class="section-header"><span class="sh-icon">💪</span><span class="sh-title">피지컬47 팀 순위</span></div>
        <div class="team-rank-list" id="teamRankList">
          <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
      </div>

      <!-- 바베큐 팀 순위 -->
      <div class="section-card">
        <div class="section-header"><span class="sh-icon">🍖</span><span class="sh-title">바베큐 팀 순위</span></div>
        <div class="team-rank-list" id="bbqRankList">
          <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
      </div>

      <!-- 개인 TOP 5 -->
      <div class="section-card">
        <div class="section-header"><span class="sh-icon">⭐</span><span class="sh-title">개인 TOP 5</span></div>
        <div class="ranking-list" id="rankingList">
          <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
      </div>

      <button class="logout-btn" onclick="doLogout()">🚪 로그아웃</button>
    </div>

    <!-- ── 커뮤니티 탭 (게임 + 동아리) ── -->
    <div class="tab-panel" id="tab-community">

      <!-- 첫 참여 이벤트 -->
      <div class="section-card">
        <div class="section-header">
          <span class="sh-icon">🌟</span>
          <span class="sh-title">첫 참여 이벤트</span>
          <span class="sh-badge-gold" id="reviewEventBadge">+100점</span>
        </div>
        <div id="reviewContent">
          <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
      </div>

      <!-- 뽑기 게임 -->
      <div class="section-card">
        <div class="section-header">
          <span class="sh-icon">🎮</span>
          <span class="sh-title">뽑기 게임</span>
          <span class="sh-badge" id="gameCountBadge">0/3</span>
        </div>
        <div id="gameContent">
          <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
      </div>

      <!-- TF 추천 공지 -->
      <div class="club-notice-card">
        <div class="club-notice-header">
          <span class="sh-icon">📌</span>
          <span class="sh-title">TF 추천 활동</span>
          <span class="club-notice-badge">공지</span>
        </div>
        <div class="club-notice-list" id="clubNoticeList"></div>
      </div>

      <!-- 동아리 만들기 버튼 -->
      <button class="btn-club-create" onclick="window.toggleClubForm()">＋ 동아리 만들기</button>

      <!-- 생성 폼 (기본 숨김) -->
      <div class="club-form-card" id="clubFormCard" style="display:none">
        <div class="section-header">
          <span class="sh-icon">✏️</span>
          <span class="sh-title">새 동아리</span>
        </div>
        <div class="club-form-body">
          <div>
            <label class="club-form-label">제목 *</label>
            <input class="club-form-input" id="clubTitle" placeholder="예: 산책 같이 해요" maxlength="30">
          </div>
          <div>
            <label class="club-form-label">설명 *</label>
            <input class="club-form-input" id="clubDesc" placeholder="간단하게 소개해주세요" maxlength="60">
          </div>
          <div class="club-form-row">
            <div>
              <label class="club-form-label">장소</label>
              <input class="club-form-input" id="clubPlace" placeholder="예: 로비" maxlength="20">
            </div>
            <div>
              <label class="club-form-label">시간</label>
              <input class="club-form-input" id="clubTime" placeholder="예: 9시" maxlength="20">
            </div>
          </div>
          <div>
            <label class="club-form-label">최대 인원 (없으면 무제한)</label>
            <input class="club-form-input" id="clubMax" type="number" placeholder="숫자 입력" min="1" max="50">
          </div>
          <button class="btn-club-submit" onclick="window.submitClub()">동아리 개설하기</button>
          <button class="btn-club-cancel" onclick="window.toggleClubForm()">취소</button>
        </div>
      </div>

      <!-- 동아리 목록 -->
      <div id="clubList">
        <div class="loading-dots"><span></span><span></span><span></span></div>
      </div>

    </div>

  </div><!-- /.tab-content -->
</div><!-- /#appScreen -->

<!-- ───────────── 하단 네비게이션 ───────────── -->
<nav class="bottom-nav" id="bottomNav">
  <button class="nav-btn active" id="navHome" onclick="switchTab('home')">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">홈</span>
  </button>
  <button class="nav-btn community-tab" id="navCommunity" onclick="switchTab('community')">
    <span class="nav-icon">🤝</span>
    <span class="nav-label">커뮤니티</span>
  </button>
</nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, update, push, remove }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ── Firebase 설정 ──────────────────────────────────────
  const firebaseConfig = {
    apiKey:            "AIzaSyC7S-HzpRjOPqtbyfJAYO1y3ir0msbV4SA",
    authDomain:        "oromworkshop-56b21.firebaseapp.com",
    databaseURL:       "https://oromworkshop-56b21-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "oromworkshop-56b21",
    storageBucket:     "oromworkshop-56b21.firebasestorage.app",
    messagingSenderId: "769454280422",
    appId:             "1:769454280422:web:7ec2295e6f58e157d67527"
  };

  // ── 뽑기 게임 설정 ────────────────────────────────────
  const BET_OPTIONS = [10, 30, 50, 100];
  const MAX_PLAYS   = 3;
  const PRIZE_POOL  = ['fail', 'keep', 'keep', 'x1.5', 'x2'];

  // ── 별점 이벤트 설정 ──────────────────────────────────
  const REVIEW_REQUIRED_TEXT  = '오롬 워크샵 너무 재미있어요!';
  const REVIEW_REQUIRED_STARS = 5;
  const REVIEW_REWARD         = 100;

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  const TOP_N = 5;
  let currentUser     = null;
  let allParticipants = {};
  let allTeams        = {};
  let allBbqTeams     = {};

  // 뽑기 게임 상태
  let gamePhase      = 'idle'; // 'idle' | 'picking' | 'result'
  let selectedBet    = null;
  let lastResult     = null;
  let gameProcessing = false;

  // 별점 이벤트 상태
  let selectedStars        = 0;
  let reviewProcessing     = false;
  let reviewInitialized    = false;
  let reviewCompletedCache = false;

  // ── 탭 전환 ───────────────────────────────────────────
  window.switchTab = function(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    document.getElementById('navHome').classList.toggle('active', name === 'home');
    document.getElementById('navCommunity').classList.toggle('active', name === 'community');
  };

  // ── 팀 색상 ───────────────────────────────────────────
  const TEAM_COLORS = ['A','B','C','D','E','F'];
  function getTeamClass(teamName, dict) {
    const idx = Object.keys(dict || {}).indexOf(teamName);
    return TEAM_COLORS[(idx < 0 ? 0 : idx) % TEAM_COLORS.length];
  }

  // ── 로그인 ────────────────────────────────────────────
  window.doLogin = function() {
    const name = document.getElementById('inputName').value.trim();
    const code = document.getElementById('inputCode').value.trim();
    if (!name || !code) { showLoginError(); return; }
    onValue(ref(db,'participants'), snap => {
      const data = snap.val();
      if (!data) { showLoginError(); return; }
      const match = Object.entries(data).find(([k,v]) => v.name===name && v.code===code);
      if (match) {
        const [uid, user] = match;
        currentUser = { uid, ...user };
        localStorage.setItem('ws_user', JSON.stringify(currentUser));
        startApp();
      } else { showLoginError(); }
    }, { onlyOnce: true });
  };

  function showLoginError() {
    document.getElementById('loginError').style.display = 'block';
  }

  window.doLogout = function() {
    localStorage.removeItem('ws_user'); location.reload();
  };

  document.getElementById('inputCode').addEventListener('keyup', e => { if(e.key==='Enter') window.doLogin(); });
  document.getElementById('inputName').addEventListener('keyup', e => { if(e.key==='Enter') document.getElementById('inputCode').focus(); });

  const saved = localStorage.getItem('ws_user');
  if (saved) {
    try { currentUser = JSON.parse(saved); startApp(); }
    catch(e) { localStorage.removeItem('ws_user'); }
  }

  // ── 앱 시작 ───────────────────────────────────────────
  function startApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display   = 'block';
    document.getElementById('bottomNav').style.display   = 'flex';
    document.getElementById('headerName').textContent    = currentUser.name;
    onValue(ref(db,'participants'), snap => {
      allParticipants = snap.val() || {};
      renderRanking();
      updateMyScores();
    });
    onValue(ref(db,'teams'),   snap => { allTeams = snap.val() || {}; renderTeamRanking(); updateMyTeamScore(); });
    onValue(ref(db,'bbqTeams'),snap => { allBbqTeams = snap.val() || {}; renderBbqTeamRanking(); updateMyBbqTeamScore(); });
    onValue(ref(db,'notices'), snap => { renderNotice(snap.val()); });
    onValue(ref(db,'clubs'),   snap => { allClubs = snap.val() || {}; renderClubList(); });
    renderClubNotices();
  }

  // ── 내 점수 업데이트 ──────────────────────────────────
  function updateMyScores() {
    const me = allParticipants[currentUser.uid]; if (!me) return;

    // 개인 점수 표시
    const ps = document.getElementById('personalScoreDisplay');
    if (ps.textContent !== String(me.score || 0)) {
      ps.textContent = me.score || 0;
      ps.classList.remove('score-flash'); void ps.offsetWidth; ps.classList.add('score-flash');
    }

    // 팀 뱃지 (피지컬47)
    const tc    = getTeamClass(me.team, allTeams);
    const badge = document.getElementById('headerTeamBadge');
    badge.textContent = me.team || ''; badge.className = `team-badge tc-${tc}`;

    // 팀 뱃지 (바베큐)
    const bbqBadge = document.getElementById('headerBbqBadge');
    if (me.bbqTeam) {
      bbqBadge.textContent = `🍖 ${me.bbqTeam}`;
      bbqBadge.style.display = '';
    } else {
      bbqBadge.style.display = 'none';
    }

    // 별점 이벤트 동기화
    const serverCompleted = !!me.reviewEventCompleted;
    if (!reviewInitialized || (serverCompleted && !reviewCompletedCache)) {
      reviewInitialized    = true;
      reviewCompletedCache = serverCompleted;
      renderReviewEvent(serverCompleted);
    }

    // 뽑기 게임 동기화 (결과 화면 중엔 뱃지만 갱신)
    const serverCount = me.drawGameCount || 0;
    if (gamePhase !== 'result') {
      renderGame(serverCount);
    } else {
      document.getElementById('gameCountBadge').textContent = `${serverCount}/${MAX_PLAYS}`;
    }
  }

  function updateMyTeamScore() {
    const me = allParticipants[currentUser.uid]; if (!me) return;
    const td = allTeams[me.team]; if (!td) return;
    const ts = document.getElementById('teamScoreDisplay');
    if (ts.textContent !== String(td.score || 0)) {
      ts.textContent = td.score || 0;
      ts.classList.remove('score-flash'); void ts.offsetWidth; ts.classList.add('score-flash');
    }
  }

  function updateMyBbqTeamScore() {
    const me = allParticipants[currentUser.uid]; if (!me) return;
    const ts = document.getElementById('bbqScoreDisplay');
    const score = me.bbqTeam ? (allBbqTeams[me.bbqTeam]?.score || 0) : 0;
    if (ts.textContent !== String(score)) {
      ts.textContent = score;
      ts.classList.remove('score-flash'); void ts.offsetWidth; ts.classList.add('score-flash');
    }
  }

  // ── 공지 ─────────────────────────────────────────────
  function renderNotice(data) {
    const el = document.getElementById('noticeBody');
    if (!data) { el.innerHTML='<p class="notice-empty">공지사항이 없습니다.</p>'; return; }
    const list = Object.values(data).sort((a,b)=>b.timestamp-a.timestamp);
    if (!list.length) { el.innerHTML='<p class="notice-empty">공지사항이 없습니다.</p>'; return; }
    const latest = list[0];
    const t = new Date(latest.timestamp).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    el.innerHTML = `<p class="notice-text"><span class="notice-new"></span>${escHtml(latest.text)}</p><p class="notice-time">📅 ${t} 업데이트</p>`;
  }

  // ── 개인 TOP 5 ────────────────────────────────────────
  function renderRanking() {
    const el = document.getElementById('rankingList');
    const sorted = Object.entries(allParticipants)
      .map(([uid,p]) => ({uid,...p}))
      .sort((a,b) => (b.score||0)-(a.score||0))
      .slice(0, TOP_N);
    if (!sorted.length) { el.innerHTML='<p style="color:var(--text2);text-align:center;padding:20px">데이터 없음</p>'; return; }
    const icons = ['🥇','🥈','🥉'];
    el.innerHTML = sorted.map((p,i) => {
      const isMe    = p.uid === currentUser.uid;
      const numHtml = i<3 ? `<span class="rank-num top${i+1}">${icons[i]}</span>` : `<span class="rank-num">${i+1}</span>`;
      return `<div class="rank-item${isMe?' me':''}">
        ${numHtml}
        <div class="rank-info">
          <div class="rank-name">${escHtml(p.name)}${isMe?'<span class="me-tag">나</span>':''}</div>
          <div class="rank-team">${escHtml(p.team||'')}</div>
        </div>
        <div class="rank-score">${p.score||0}<span>점</span></div>
      </div>`;
    }).join('');
  }

  // ── 팀 순위 (피지컬47) ────────────────────────────────
  function renderTeamRanking() {
    const el = document.getElementById('teamRankList');
    const me = allParticipants[currentUser.uid];
    const sorted = Object.entries(allTeams)
      .map(([k,v]) => ({key:k,...v}))
      .sort((a,b) => (b.score||0)-(a.score||0));
    if (!sorted.length) { el.innerHTML='<p style="color:var(--text2);text-align:center;padding:20px">데이터 없음</p>'; return; }
    el.innerHTML = sorted.map(t => {
      const tc       = getTeamClass(t.key, allTeams);
      const isMyTeam = me && me.team === t.key;
      return `<div class="team-rank-item" style="${isMyTeam?'background:#f5f3ff':''}">
        <div class="team-color-dot dot-${tc}"></div>
        <div class="team-rank-name">${escHtml(t.teamName||t.key)}${isMyTeam?'<span class="me-tag">내 팀</span>':''}</div>
        <div class="team-rank-score score-${tc}">${t.score||0}<span style="font-size:13px;color:var(--text2);font-weight:400;font-family:sans-serif">점</span></div>
      </div>`;
    }).join('');
  }

  // ── 팀 순위 (바베큐) ──────────────────────────────────
  function renderBbqTeamRanking() {
    const el = document.getElementById('bbqRankList');
    const me = allParticipants[currentUser.uid];
    const sorted = Object.entries(allBbqTeams)
      .map(([k,v]) => ({key:k,...v}))
      .sort((a,b) => (b.score||0)-(a.score||0));
    if (!sorted.length) { el.innerHTML='<p style="color:var(--text2);text-align:center;padding:20px">바베큐 팀 데이터 없음</p>'; return; }
    el.innerHTML = sorted.map(t => {
      const tc       = getTeamClass(t.key, allBbqTeams);
      const isMyTeam = me && me.bbqTeam === t.key;
      return `<div class="team-rank-item" style="${isMyTeam?'background:#fffaec':''}">
        <div class="team-color-dot dot-${tc}"></div>
        <div class="team-rank-name">${escHtml(t.teamName||t.key)}${isMyTeam?'<span class="me-tag" style="background:var(--gold)">내 팀</span>':''}</div>
        <div class="team-rank-score score-${tc}">${t.score||0}<span style="font-size:13px;color:var(--text2);font-weight:400;font-family:sans-serif">점</span></div>
      </div>`;
    }).join('');
  }

  // ══════════════════════════════════════════════════════
  // ── 별점 이벤트 ──────────────────────────────────────
  // ══════════════════════════════════════════════════════

  function renderReviewEvent(completed) {
    const el = document.getElementById('reviewContent');
    if (completed) {
      document.getElementById('reviewEventBadge').textContent = '참여완료 ✓';
      el.innerHTML = `
        <div class="review-complete-box">
          <span class="review-complete-emoji">🎉</span>
          <div class="review-complete-title">참여 완료! +${REVIEW_REWARD}점</div>
          <div class="review-complete-desc">리뷰 이벤트에 참여해주셔서 감사합니다 😊</div>
        </div>`;
      return;
    }
    const starsHtml = Array.from({length: REVIEW_REQUIRED_STARS}, (_,i) =>
      `<button class="star-btn${i < selectedStars ? ' active' : ''}" onclick="window.selectStar(${i+1})">⭐</button>`
    ).join('');
    el.innerHTML = `
      <div class="review-body">
        <div class="review-desc">
          별 <strong>5개</strong>와 아래 문구를 그대로 입력하면 <strong>+${REVIEW_REWARD}점</strong>을 드려요!
        </div>
        <div class="star-row">${starsHtml}</div>
        <textarea class="review-input" id="reviewInput" rows="2"
          placeholder="${escHtml(REVIEW_REQUIRED_TEXT)}"></textarea>
        <div class="review-error" id="reviewError"></div>
        <button class="btn-review-submit" onclick="window.submitReview()">✍️ 제출하기</button>
      </div>`;
  }

  window.selectStar = function(n) {
    selectedStars = n;
    document.querySelectorAll('.star-btn').forEach((btn, i) => {
      btn.classList.toggle('active', i < n);
    });
  };

  window.submitReview = async function() {
    if (reviewProcessing) return;
    const me = allParticipants[currentUser.uid];
    if (me?.reviewEventCompleted) { renderReviewEvent(true); return; }
    const inputEl   = document.getElementById('reviewInput');
    const inputText = (inputEl?.value || '').trim();
    if (selectedStars < REVIEW_REQUIRED_STARS) { showReviewError('별 5개를 모두 선택해주세요 ⭐'); return; }
    if (inputText !== REVIEW_REQUIRED_TEXT)    { showReviewError('문구를 정확히 입력해주세요'); return; }
    reviewProcessing = true;
    const btn = document.querySelector('.btn-review-submit');
    if (btn) { btn.disabled = true; btn.textContent = '처리 중...'; }
    try {
      const currentScore = me?.score ?? 0;
      await update(ref(db, `participants/${currentUser.uid}`), {
        score: currentScore + REVIEW_REWARD, reviewEventCompleted: true
      });
      reviewCompletedCache = true;
      renderReviewEvent(true);
    } catch(e) {
      console.error('별점 이벤트 저장 실패', e);
      showReviewError('오류가 발생했습니다. 다시 시도해주세요.');
    }
    reviewProcessing = false;
  };

  function showReviewError(msg) {
    const el = document.getElementById('reviewError');
    if (!el) return;
    el.textContent = msg; el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 3000);
  }

  // ══════════════════════════════════════════════════════
  // ── 뽑기 게임 ────────────────────────────────────────
  // ══════════════════════════════════════════════════════

  function renderGame(count) {
    const el    = document.getElementById('gameContent');
    const me    = allParticipants[currentUser.uid];
    const score = me?.score ?? 0;
    count = count ?? (me?.drawGameCount ?? 0);

    document.getElementById('gameCountBadge').textContent = `${count}/${MAX_PLAYS}`;

    if (count >= MAX_PLAYS) {
      el.innerHTML = `<div class="game-done-msg">🎉 3회 모두 참여했어요!<br><span style="font-size:13px">수고하셨습니다 😊</span></div>`;
      return;
    }

    const dotsHtml = Array.from({length: MAX_PLAYS}, (_,i) =>
      `<div class="game-count-dot${i < count ? ' used' : ''}"></div>`
    ).join('');

    const betHtml = BET_OPTIONS.map(b => {
      const disabled = b > score;
      const selected = selectedBet === b;
      return `<button class="bet-btn${selected?' selected':''}"
        ${disabled ? 'disabled' : ''}
        onclick="window.selectBet(${b})">${b}</button>`;
    }).join('');

    const slipsActive = (gamePhase === 'picking');
    const slipHtml = Array.from({length: 5}, (_,i) =>
      `<button class="slip-btn"
        ${slipsActive ? '' : 'disabled'}
        onclick="window.pickSlip(${i})">📝</button>`
    ).join('');

    const hintText = slipsActive
      ? `베팅: <strong>${selectedBet}점</strong> — 쪽지 하나를 뽑으세요!`
      : '베팅 금액을 선택하면 쪽지를 뽑을 수 있어요.';

    el.innerHTML = `
      <div class="game-body">
        <div class="game-count-row">
          <div class="game-count-dots">${dotsHtml}</div>
          <span class="game-count-label">참여 ${count}/${MAX_PLAYS}</span>
        </div>
        <div>
          <div class="game-section-label">💰 베팅 금액</div>
          <div class="bet-grid">${betHtml}</div>
        </div>
        <div>
          <div class="slip-hint">${hintText}</div>
          <div class="slip-grid">${slipHtml}</div>
        </div>
      </div>`;
  }

  window.selectBet = function(amount) {
    const me = allParticipants[currentUser.uid];
    if ((me?.score ?? 0) < amount) return;
    selectedBet = amount;
    gamePhase   = 'picking';
    renderGame(me?.drawGameCount ?? 0);
  };

  window.pickSlip = async function(idx) {
    if (gameProcessing || gamePhase !== 'picking' || selectedBet === null) return;
    gameProcessing = true;

    document.querySelectorAll('.slip-btn').forEach(b => b.disabled = true);

    const prizes = [...PRIZE_POOL].sort(() => Math.random() - 0.5);
    const result = prizes[idx];

    const me           = allParticipants[currentUser.uid];
    const currentScore = me?.score ?? 0;
    const B            = selectedBet;
    const currentCount = me?.drawGameCount ?? 0;

    let delta = 0;
    if      (result === 'fail') delta = -B;
    else if (result === 'keep') delta =  0;
    else if (result === 'x1.5') delta =  Math.floor(B * 0.5);
    else if (result === 'x2')   delta =  B;

    try {
      await update(ref(db, `participants/${currentUser.uid}`), {
        score: currentScore + delta, drawGameCount: currentCount + 1
      });
      await push(ref(db, 'gameLogs'), {
        user: currentUser.name, uid: currentUser.uid,
        bet: B, result, delta, timestamp: Date.now()
      });
    } catch(e) {
      console.error('Firebase 업데이트 실패', e);
    }

    lastResult  = { result, delta, B, newCount: currentCount + 1 };
    gamePhase   = 'result';
    showGameResult();
    gameProcessing = false;
  };

  function showGameResult() {
    const el = document.getElementById('gameContent');
    const { result, delta, B, newCount } = lastResult;

    let emoji, title, titleClass, deltaText, deltaClass;
    if (result === 'fail') {
      emoji = '💀'; title = '꽝!'; titleClass = 'fail';
      deltaText = `-${B}점`; deltaClass = 'minus';
    } else if (result === 'keep') {
      emoji = '😐'; title = '그대로!'; titleClass = 'keep';
      deltaText = '변동 없음'; deltaClass = 'zero';
    } else if (result === 'x1.5') {
      emoji = '🎉'; title = '1.5배 당첨!'; titleClass = 'win';
      deltaText = `+${Math.floor(B*0.5)}점`; deltaClass = 'plus';
    } else {
      emoji = '🏆'; title = '2배 당첨!'; titleClass = 'win';
      deltaText = `+${B}점`; deltaClass = 'plus';
    }

    document.getElementById('gameCountBadge').textContent = `${newCount}/${MAX_PLAYS}`;
    const remaining = MAX_PLAYS - newCount;

    el.innerHTML = `
      <div class="game-body">
        <div class="game-result-box">
          <span class="game-result-emoji">${emoji}</span>
          <div class="game-result-title ${titleClass}">${title}</div>
          <div class="game-result-delta ${deltaClass}">${deltaText}</div>
          <button class="btn-game-action ${remaining > 0 ? 'active' : 'done'}"
            ${remaining === 0 ? 'disabled' : ''}
            onclick="window.resetGame()">
            ${remaining > 0 ? `다시 뽑기 (${remaining}회 남음)` : '완료! 수고하셨습니다 🎊'}
          </button>
        </div>
      </div>`;
  }

  window.resetGame = function() {
    selectedBet = null;
    gamePhase   = 'idle';
    lastResult  = null;
    const me    = allParticipants[currentUser.uid];
    renderGame(me?.drawGameCount ?? 0);
  };

  // ══════════════════════════════════════════════════════
  // ── 동아리 기능 ──────────────────────────────────────
  // ══════════════════════════════════════════════════════

  const CLUB_NOTICE_POSTS = [
    { title: "글로우펏 (블랙 라이트 미니 골프)", place: "리조트 지하 2층",  description: "형광 조명 아래에서 즐기는 미니 골프. 가볍게 놀기 좋음" },
    { title: "인스파이어 리조트",                place: "차량 약 10분",     description: "고래 미디어아트, 대형 오락실 등 볼거리/즐길거리 다양" },
    { title: "카페 오라",                        place: "도보 약 5분",      description: "가까운 거리에서 편하게 쉬기 좋은 카페" },
    { title: "카페 블랑",                        place: "도보 약 10분",     description: "여유롭게 쉬기 좋은 카페 (저녁 식사 건물 3층)" },
    { title: "자유 주제",                        place: "",                description: "원하는 활동 자유롭게 모집 (산책, 간식, 수다 등)" }
  ];

  let allClubs       = {};
  let clubFormOpen   = false;
  let clubSubmitting = false;
  let editingClubId  = null;

  // 공지 렌더
  function renderClubNotices() {
    const el = document.getElementById('clubNoticeList');
    el.innerHTML = CLUB_NOTICE_POSTS.map(p => `
      <div class="club-notice-item">
        <div class="club-notice-title">${escHtml(p.title)}</div>
        ${p.place ? `<div class="club-notice-place">📍 ${escHtml(p.place)}</div>` : ''}
        <div class="club-notice-desc">${escHtml(p.description)}</div>
      </div>`).join('');
  }

  // 폼 토글
  window.toggleClubForm = function() {
    clubFormOpen = !clubFormOpen;
    document.getElementById('clubFormCard').style.display = clubFormOpen ? 'block' : 'none';
    if (!clubFormOpen) {
      ['clubTitle','clubDesc','clubPlace','clubTime','clubMax'].forEach(id => {
        document.getElementById(id).value = '';
      });
    }
  };

  // 동아리 생성
  window.submitClub = async function() {
    if (clubSubmitting) return;
    const title = document.getElementById('clubTitle').value.trim();
    const desc  = document.getElementById('clubDesc').value.trim();
    if (!title || !desc) { alert('제목과 설명은 필수입니다.'); return; }

    const place    = document.getElementById('clubPlace').value.trim();
    const time     = document.getElementById('clubTime').value.trim();
    const maxRaw   = document.getElementById('clubMax').value.trim();
    const maxVal   = maxRaw ? parseInt(maxRaw) : null;

    clubSubmitting = true;
    const btn = document.querySelector('.btn-club-submit');
    if (btn) { btn.disabled = true; btn.textContent = '생성 중...'; }

    try {
      const newClub = {
        title, description: desc,
        place: place || null, time: time || null,
        maxMembers: maxVal || null,
        creatorId:   currentUser.uid,
        creatorName: currentUser.name,
        participants: { [currentUser.uid]: true },
        createdAt: Date.now()
      };
      await push(ref(db, 'clubs'), newClub);
      window.toggleClubForm();
    } catch(e) {
      console.error('동아리 생성 실패', e);
      alert('오류가 발생했습니다. 다시 시도해주세요.');
    }

    if (btn) { btn.disabled = false; btn.textContent = '동아리 개설하기'; }
    clubSubmitting = false;
  };

  // 동아리 참여
  window.joinClub = async function(clubId) {
    try {
      await update(ref(db, `clubs/${clubId}/participants`), { [currentUser.uid]: true });
    } catch(e) {
      console.error('참여 실패', e);
    }
  };

  // 참여 취소
  window.leaveClub = async function(clubId) {
    if (!confirm('참여를 취소할까요?')) return;
    try {
      await remove(ref(db, `clubs/${clubId}/participants/${currentUser.uid}`));
    } catch(e) {
      console.error('참여 취소 실패', e);
    }
  };

  // 동아리 삭제
  window.deleteClub = async function(clubId) {
    if (!confirm('동아리를 삭제할까요? 되돌릴 수 없습니다.')) return;
    try {
      await remove(ref(db, `clubs/${clubId}`));
    } catch(e) {
      console.error('삭제 실패', e);
    }
  };

  // 수정 폼 열기
  window.openEditForm = function(clubId) {
    editingClubId = clubId;
    renderClubList(); // 수정 폼 포함해서 다시 렌더
  };

  // 수정 취소
  window.cancelEditClub = function() {
    editingClubId = null;
    renderClubList();
  };

  // 수정 저장
  window.submitEditClub = async function(clubId) {
    const title = document.getElementById(`editTitle_${clubId}`).value.trim();
    const desc  = document.getElementById(`editDesc_${clubId}`).value.trim();
    if (!title || !desc) { alert('제목과 설명은 필수입니다.'); return; }
    const place  = document.getElementById(`editPlace_${clubId}`).value.trim();
    const time   = document.getElementById(`editTime_${clubId}`).value.trim();
    const maxRaw = document.getElementById(`editMax_${clubId}`).value.trim();
    const maxVal = maxRaw ? parseInt(maxRaw) : null;
    try {
      await update(ref(db, `clubs/${clubId}`), {
        title, description: desc,
        place: place || null, time: time || null,
        maxMembers: maxVal || null
      });
      editingClubId = null;
    } catch(e) {
      console.error('수정 실패', e);
      alert('오류가 발생했습니다.');
    }
  };

  // 동아리 목록 렌더
  function renderClubList() {
    const el = document.getElementById('clubList');
    const list = Object.entries(allClubs).sort((a,b) => (a[1].createdAt||0)-(b[1].createdAt||0));

    if (!list.length) {
      el.innerHTML = `<div class="club-list-empty">아직 개설된 동아리가 없어요 😊<br>첫 번째 동아리를 만들어보세요!</div>`;
      return;
    }

    el.innerHTML = list.map(([cid, c]) => {
      const members     = Object.keys(c.participants || {});
      const memberCount = members.length;
      const maxM        = c.maxMembers;
      const isFull      = maxM && memberCount >= maxM;
      const isJoined    = members.includes(currentUser.uid);
      const isCreator   = c.creatorId === currentUser.uid;
      const isEditing   = editingClubId === cid;

      // 참여자 이름 표시 (최대 5명 + 나머지 수)
      const nameList = members.map(uid => {
        const p = allParticipants[uid];
        return p ? p.name : '?';
      });
      const showNames = nameList.slice(0,5).join(', ') + (nameList.length > 5 ? ` 외 ${nameList.length-5}명` : '');

      const countBadge = maxM
        ? `<span class="club-count-badge${isFull?' full':''}">${memberCount}/${maxM}명</span>`
        : `<span class="club-count-badge">${memberCount}명</span>`;

      // 참여/취소/마감 버튼
      let joinBtn = '';
      if (isCreator) {
        joinBtn = `<button class="btn-club-joined">👑 내가 만든 동아리</button>`;
      } else if (isJoined) {
        joinBtn = `<button class="btn-club-join" style="background:linear-gradient(135deg,#e02040,#a0001a);box-shadow:0 4px 12px rgba(224,32,64,0.25)" onclick="window.leaveClub('${cid}')">참여 취소</button>`;
      } else if (isFull) {
        joinBtn = `<button class="btn-club-join" disabled>인원 마감</button>`;
      } else {
        joinBtn = `<button class="btn-club-join" onclick="window.joinClub('${cid}')">참여하기</button>`;
      }

      // 개설자 전용 관리 버튼
      const creatorBtns = isCreator ? `
        <div style="display:flex;gap:8px;margin-top:4px">
          <button onclick="window.openEditForm('${cid}')"
            style="flex:1;background:none;border:1.5px solid var(--border);color:var(--text2);border-radius:10px;padding:9px;font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer">
            ✏️ 수정
          </button>
          <button onclick="window.deleteClub('${cid}')"
            style="flex:1;background:none;border:1.5px solid rgba(224,32,64,0.3);color:var(--danger);border-radius:10px;padding:9px;font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer">
            🗑 삭제
          </button>
        </div>` : '';

      // 수정 폼 (수정 중일 때만 표시)
      const editForm = isEditing ? `
        <div style="display:flex;flex-direction:column;gap:10px;padding:14px 18px;border-top:1px solid var(--border);background:var(--surface2)">
          <input class="club-form-input" id="editTitle_${cid}" value="${escHtml(c.title)}" placeholder="제목 *">
          <input class="club-form-input" id="editDesc_${cid}"  value="${escHtml(c.description)}" placeholder="설명 *">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <input class="club-form-input" id="editPlace_${cid}" value="${escHtml(c.place||'')}" placeholder="장소">
            <input class="club-form-input" id="editTime_${cid}"  value="${escHtml(c.time||'')}"  placeholder="시간">
          </div>
          <input class="club-form-input" id="editMax_${cid}" type="number" value="${c.maxMembers||''}" placeholder="최대 인원 (없으면 무제한)">
          <div style="display:flex;gap:8px">
            <button class="btn-club-submit" style="flex:1;padding:11px;font-size:14px" onclick="window.submitEditClub('${cid}')">저장</button>
            <button class="btn-club-cancel" style="flex:1" onclick="window.cancelEditClub()">취소</button>
          </div>
        </div>` : '';

      return `
        <div class="club-card">
          <div class="club-card-header">
            <div class="club-card-title">${escHtml(c.title)}</div>
            <div class="club-card-meta">
              ${c.place ? `<span class="club-meta-chip">📍 ${escHtml(c.place)}</span>` : ''}
              ${c.time  ? `<span class="club-meta-chip">🕐 ${escHtml(c.time)}</span>`  : ''}
              <span class="club-meta-chip">👤 ${escHtml(c.creatorName)}</span>
            </div>
          </div>
          <div class="club-card-body">
            <div class="club-card-desc">${escHtml(c.description)}</div>
            <div class="club-members-row">
              <div style="flex:1;min-width:0">
                <div class="club-members-label">참여자</div>
                <div class="club-members-list">${escHtml(showNames)}</div>
              </div>
              ${countBadge}
            </div>
            ${joinBtn}
            ${creatorBtns}
          </div>
          ${editForm}
        </div>`;
    }).join('');
  }

  // ── 유틸 ─────────────────────────────────────────────
  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
